name: KAS Build

on:
  workflow_call:
    inputs:
      kas-config:
        description: 'Colon-separated KAS YAML config string'
        required: true
        type: string
      machine:
        description: 'Machine name (used to locate deploy images)'
        required: true
        type: string
      artifact-name:
        description: 'Base name for the build artifact'
        required: true
        type: string
      use-temp-cache:
        description: 'Use runner-local temp directories for SSTATE_DIR/DL_DIR instead of the system persistent cache'
        required: false
        type: boolean
        default: false
      rsync-enabled:
        description: 'rsync matching build outputs to a remote host after the build'
        required: false
        type: boolean
        default: false
      rsync-host:
        description: 'Hostname or IP of the rsync destination'
        required: false
        type: string
        default: ''
      rsync-user:
        description: 'SSH user on the rsync host'
        required: false
        type: string
        default: 'pi'
      rsync-dest:
        description: 'Absolute path on the rsync host to sync into (with trailing slash)'
        required: false
        type: string
        default: ''
      rsync-pattern:
        description: 'Glob pattern for files to sync from deploy/images/<machine>/ (symlinks excluded)'
        required: false
        type: string
        default: '*.swu'
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: imx-runner
    timeout-minutes: 720  # 12 hours — Yocto builds can be long

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          # Full history + tags so `git describe` can resolve a meaningful
          # IMDT_DISTRO_VERSION (tag on tag builds, else describe/SHA).
          fetch-depth: 0
          fetch-tags: true
          # Don't persist HTTPS credentials — the self-hosted runner's SSH
          # config handles auth, and HTTPS token setup conflicts with it when
          # this workflow is called from another repo.
          persist-credentials: false

      - name: Determine distro version
        run: |
          set -euo pipefail
          VERSION="$(git describe --tags --always --dirty)"
          # Forward the resolved git version under two names:
          #   IMDT_DISTRO_VERSION  - consumed by repos that set DISTRO_VERSION
          #                          from it (e.g. meta-imdt-renesas/-imx).
          #   META_IMDT_LAYER_VERSION - consumed by repos that surface it as a
          #                          dedicated os-release field (e.g. meta-imdt-qcom-oss).
          # Both carry the same value; consumers opt in via their kas env block.
          echo "IMDT_DISTRO_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "META_IMDT_LAYER_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Resolved version=${VERSION}"

      - name: Ensure LFS objects are materialized
        run: |
          set -e
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "::error::git-lfs is not installed on this runner — install it (e.g. 'apt-get install git-lfs') so LFS-tracked firmware zips are fetched instead of pointer files."
            exit 1
          fi
          git lfs pull
          missing=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if head -c 40 -- "$f" 2>/dev/null | grep -q '^version https://git-lfs'; then
              echo "::error::$f is still an LFS pointer after 'git lfs pull'"
              missing=1
            fi
          done < <(git lfs ls-files -n)
          [ "$missing" -eq 0 ]

      - name: Configure and create cache directories
        run: |
          if [ "${{ inputs.use-temp-cache }}" = "true" ]; then
            SSTATE_PATH="${RUNNER_TEMP}/sstate-cache"
            DL_PATH="${RUNNER_TEMP}/downloads"
            echo "SSTATE_DIR=${SSTATE_PATH}" >> "$GITHUB_ENV"
            echo "SSTATE_CACHE=${SSTATE_PATH}" >> "$GITHUB_ENV"
            echo "DL_DIR=${DL_PATH}" >> "$GITHUB_ENV"
          else
            SSTATE_PATH="$SSTATE_DIR"
            DL_PATH="$DL_DIR"
          fi
          echo "BB_HASHSERVE_DB_DIR=${SSTATE_DIR}" >> "${GITHUB_ENV}"
          mkdir -p "$SSTATE_PATH"
          mkdir -p "$DL_PATH"

      - name: Build ${{ inputs.artifact-name }}
        env:
          KAS_BUILD_DIR: ${{ github.workspace }}/build
        run: |
          set -euo pipefail

          echo "=== Building ${{ inputs.artifact-name }} ==="
          echo "=== Commit: $(git rev-parse HEAD) ==="
          echo "=== Branch: ${GITHUB_REF_NAME} ==="
          echo "=== DL_DIR: ${DL_DIR} ==="
          echo "=== SSTATE_DIR: ${SSTATE_DIR} ==="
          echo "=== KAS Config: ${{ inputs.kas-config }} ==="
          echo "=== Version: ${IMDT_DISTRO_VERSION} ==="

          # kas-container (v4.0) has no -e/--env flag, so forward the version
          # into the container via the runtime args under both supported names.
          # kas then passes whichever the consumer declares through to bitbake
          # (see env: in the consumer's kas includes and BB_ENV_PASSTHROUGH_ADDITIONS).
          kas-container --ssh-dir ~/.ssh/ \
            --runtime-args "-e IMDT_DISTRO_VERSION=${IMDT_DISTRO_VERSION} -e META_IMDT_LAYER_VERSION=${META_IMDT_LAYER_VERSION}" \
            build --update ${{ inputs.kas-config }}

      - name: Compress build artifacts
        if: success()
        run: |
          tar --zstd -cf ${{ inputs.artifact-name }}-${{ github.sha }}.tar.zst -C build/tmp/deploy/images/${{ inputs.machine }} .

      - name: Dump resolved KAS config
        if: success()
        env:
          KAS_BUILD_DIR: ${{ github.workspace }}/build
        run: |
          kas-container --ssh-dir ~/.ssh/ \
            --runtime-args "-e IMDT_DISTRO_VERSION=${IMDT_DISTRO_VERSION} -e META_IMDT_LAYER_VERSION=${META_IMDT_LAYER_VERSION}" \
            dump --resolve-refs --resolve-local --sort ${{ inputs.kas-config }} \
            > ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml
          cp ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml ${{ inputs.artifact-name }}-kas-dump.yml

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ github.sha }}
          path: ${{ inputs.artifact-name }}-${{ github.sha }}.tar.zst
          retention-days: 30

      - name: Upload resolved KAS dump
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump
          path: ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml
          retention-days: 30

      - name: rsync build outputs to LAVA server
        if: success() && inputs.rsync-enabled
        run: |
          # Sync each matching symlink to the destination with the commit SHA
          # embedded in the filename so every build's artifact is unambiguous.
          # e.g. imdt-image-base.swu-imdt-8550-sbc.rootfs-abc1234.swu
          SHA="${{ github.sha }}"
          find build/tmp/deploy/images/${{ inputs.machine }} \
              -maxdepth 1 -type l -name "${{ inputs.rsync-pattern }}" | \
          while read -r LINK; do
            BASENAME=$(basename "$LINK")
            DEST_NAME="${BASENAME%.swu}-${SHA}.swu"
            rsync -av --copy-links \
              "$LINK" \
              "${{ inputs.rsync-user }}@${{ inputs.rsync-host }}:${{ inputs.rsync-dest }}${DEST_NAME}"
          done

      - name: Create GitHub release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ inputs.artifact-name }}-${{ github.sha }}.tar.zst
            ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml
            ${{ inputs.artifact-name }}-kas-dump.yml

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Build notification message
        id: msg
        run: |
          RESULT="${{ needs.build.result }}"
          if [ "$RESULT" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MSG="${EMOJI} *${{ github.workflow }}* — ${RESULT}"
          MSG="${MSG}\n"
          MSG="${MSG}\n*Branch:* ${GITHUB_REF_NAME}"
          MSG="${MSG}\n*Commit:* ${{ github.sha }}"
          MSG="${MSG}\n*Triggered by:* ${{ github.actor }}"
          MSG="${MSG}\n"
          MSG="${MSG}\n<${RUN_URL}|View run>"

          echo "text=${MSG}" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "${{ steps.msg.outputs.text }}"
            }

  announce-release:
    runs-on: ubuntu-latest
    needs: build
    # Only when a tag was pushed and its build succeeded — a tag build that
    # passes is a new release worth announcing.
    if: needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Build release announcement
        id: msg
        run: |
          TAG="${GITHUB_REF_NAME}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"

          MSG="🚀 *New release: ${TAG}*"
          MSG="${MSG}\n"
          MSG="${MSG}\n*Repository:* ${{ github.repository }}"
          MSG="${MSG}\n*Commit:* ${{ github.sha }}"
          MSG="${MSG}\n*Released by:* ${{ github.actor }}"
          MSG="${MSG}\n"
          MSG="${MSG}\n<${RELEASE_URL}|View release> · <${RUN_URL}|View build>"

          echo "text=${MSG}" >> $GITHUB_OUTPUT

      - name: Send Slack release announcement
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "${{ steps.msg.outputs.text }}"
            }
