name: KAS Build

on:
  workflow_call:
    inputs:
      kas-config:
        description: 'Colon-separated KAS YAML config string'
        required: true
        type: string
      machine:
        description: 'Machine name (used to locate deploy images)'
        required: true
        type: string
      artifact-name:
        description: 'Base name for the build artifact'
        required: true
        type: string
      use-temp-cache:
        description: 'Use runner-local temp directories for SSTATE_DIR/DL_DIR instead of the system persistent cache'
        required: false
        type: boolean
        default: false
      rsync-enabled:
        description: 'rsync matching build outputs to a remote host after the build'
        required: false
        type: boolean
        default: false
      rsync-host:
        description: 'Hostname or IP of the rsync destination'
        required: false
        type: string
        default: ''
      rsync-user:
        description: 'SSH user on the rsync host'
        required: false
        type: string
        default: 'pi'
      rsync-dest:
        description: 'Absolute path on the rsync host to sync into (with trailing slash)'
        required: false
        type: string
        default: ''
      rsync-pattern:
        description: 'Space-separated glob pattern(s) for files to sync from deploy/images/<machine>/. Both the stable-named symlinks and plain files are matched; when a symlink and its target both match, only the symlink (clean name) is synced.'
        required: false
        type: string
        default: '*.swu'
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
    outputs:
      version:
        description: 'Resolved git version (git describe) baked into the build'
        value: ${{ jobs.build.outputs.version }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: imx-runner
    timeout-minutes: 720  # 12 hours — Yocto builds can be long
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          # Full history + tags so `git describe` can resolve a meaningful
          # IMDT_DISTRO_VERSION (tag on tag builds, else describe/SHA).
          fetch-depth: 0
          fetch-tags: true
          # Don't persist HTTPS credentials — the self-hosted runner's SSH
          # config handles auth, and HTTPS token setup conflicts with it when
          # this workflow is called from another repo.
          persist-credentials: false

      - name: Determine distro version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(git describe --tags --always --dirty)"
          # Expose as a workflow output so callers can pass it to downstream
          # jobs (e.g. LAVA tests that assert the value baked into the image).
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Forward the resolved git version under two names:
          #   IMDT_DISTRO_VERSION  - consumed by repos that set DISTRO_VERSION
          #                          from it (e.g. meta-imdt-renesas/-imx).
          #   META_IMDT_LAYER_VERSION - consumed by repos that surface it as a
          #                          dedicated os-release field (e.g. meta-imdt-qcom-oss).
          # Both carry the same value; consumers opt in via their kas env block.
          echo "IMDT_DISTRO_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "META_IMDT_LAYER_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Resolved version=${VERSION}"

      - name: Ensure LFS objects are materialized
        run: |
          set -e
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "::error::git-lfs is not installed on this runner — install it (e.g. 'apt-get install git-lfs') so LFS-tracked firmware zips are fetched instead of pointer files."
            exit 1
          fi
          git lfs pull
          missing=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if head -c 40 -- "$f" 2>/dev/null | grep -q '^version https://git-lfs'; then
              echo "::error::$f is still an LFS pointer after 'git lfs pull'"
              missing=1
            fi
          done < <(git lfs ls-files -n)
          [ "$missing" -eq 0 ]

      - name: Configure and create cache directories
        run: |
          if [ "${{ inputs.use-temp-cache }}" = "true" ]; then
            SSTATE_PATH="${RUNNER_TEMP}/sstate-cache"
            DL_PATH="${RUNNER_TEMP}/downloads"
            echo "SSTATE_DIR=${SSTATE_PATH}" >> "$GITHUB_ENV"
            echo "SSTATE_CACHE=${SSTATE_PATH}" >> "$GITHUB_ENV"
            echo "DL_DIR=${DL_PATH}" >> "$GITHUB_ENV"
          else
            SSTATE_PATH="$SSTATE_DIR"
            DL_PATH="$DL_DIR"
          fi
          echo "BB_HASHSERVE_DB_DIR=${SSTATE_DIR}" >> "${GITHUB_ENV}"
          mkdir -p "$SSTATE_PATH"
          mkdir -p "$DL_PATH"

      - name: Build ${{ inputs.artifact-name }}
        env:
          KAS_BUILD_DIR: ${{ github.workspace }}/build
        run: |
          set -euo pipefail

          echo "=== Building ${{ inputs.artifact-name }} ==="
          echo "=== Commit: $(git rev-parse HEAD) ==="
          echo "=== Branch: ${GITHUB_REF_NAME} ==="
          echo "=== DL_DIR: ${DL_DIR} ==="
          echo "=== SSTATE_DIR: ${SSTATE_DIR} ==="
          echo "=== KAS Config: ${{ inputs.kas-config }} ==="
          echo "=== Version: ${IMDT_DISTRO_VERSION} ==="

          # kas-container (v4.0) has no -e/--env flag, so forward the version
          # into the container via the runtime args under both supported names.
          # kas then passes whichever the consumer declares through to bitbake
          # (see env: in the consumer's kas includes and BB_ENV_PASSTHROUGH_ADDITIONS).
          kas-container --ssh-dir ~/.ssh/ \
            --runtime-args "-e IMDT_DISTRO_VERSION=${IMDT_DISTRO_VERSION} -e META_IMDT_LAYER_VERSION=${META_IMDT_LAYER_VERSION}" \
            build --update ${{ inputs.kas-config }}

      - name: Compress build artifacts
        if: success()
        run: |
          tar --zstd -cf ${{ inputs.artifact-name }}-${{ github.sha }}.tar.zst -C build/tmp/deploy/images/${{ inputs.machine }} .

      - name: Dump resolved KAS config
        if: success()
        env:
          KAS_BUILD_DIR: ${{ github.workspace }}/build
        run: |
          kas-container --ssh-dir ~/.ssh/ \
            --runtime-args "-e IMDT_DISTRO_VERSION=${IMDT_DISTRO_VERSION} -e META_IMDT_LAYER_VERSION=${META_IMDT_LAYER_VERSION}" \
            dump --resolve-refs --resolve-local --sort ${{ inputs.kas-config }} \
            > ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml
          cp ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml ${{ inputs.artifact-name }}-kas-dump.yml

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ github.sha }}
          path: ${{ inputs.artifact-name }}-${{ github.sha }}.tar.zst
          retention-days: 30

      - name: Upload resolved KAS dump
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump
          path: ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml
          retention-days: 30

      - name: rsync build outputs to LAVA server
        if: success() && inputs.rsync-enabled
        run: |
          # Sync each matching artifact to the destination with the commit SHA
          # embedded in the filename (before the extension) so every build's
          # artifact is unambiguous, e.g.
          #   imdt-image-base.swu-imdt-8550-sbc.rootfs-abc1234.swu
          #   BOOTAA64-abc1234.EFI
          # rsync-pattern may list several space-separated globs. Both the
          # stable-named symlinks and plain files are matched; when a symlink
          # and the file it points at both match a glob, only the symlink
          # (clean name) is synced so we never upload the timestamped twin.
          SHA="${{ github.sha }}"
          IMAGES_DIR="build/tmp/deploy/images/${{ inputs.machine }}"
          DEST="${{ inputs.rsync-user }}@${{ inputs.rsync-host }}:${{ inputs.rsync-dest }}"

          upload() {
            SRC="$1"
            BASENAME=$(basename "$SRC")
            STEM="${BASENAME%.*}"
            EXT="${BASENAME##*.}"
            DEST_NAME="${STEM}-${SHA}.${EXT}"
            rsync -av --copy-links "$SRC" "${DEST}${DEST_NAME}"
          }

          # Disable pathname expansion so the glob patterns reach find -name
          # literally instead of being expanded against the build directory.
          set -f
          declare -A SEEN
          for PATTERN in ${{ inputs.rsync-pattern }}; do
            # Symlinks first: they carry the clean (stable) names.
            while IFS= read -r LINK; do
              SEEN["$(readlink -f "$LINK")"]=1
              upload "$LINK"
            done < <(find "$IMAGES_DIR" -maxdepth 1 -type l -name "$PATTERN")
            # Plain files, skipping any already synced via their symlink.
            while IFS= read -r FILE; do
              if [ -z "${SEEN["$(readlink -f "$FILE")"]:-}" ]; then
                upload "$FILE"
              fi
            done < <(find "$IMAGES_DIR" -maxdepth 1 -type f -name "$PATTERN")
          done
          set +f

      - name: Prepare release assets (split if over GitHub's 2 GiB limit)
        id: release_assets
        if: success() && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          # The build artifact carries the commit SHA so per-build uploads never
          # collide; the *release* assets use a clean, SHA-free name so consumers
          # can wget them from a stable .../releases/latest/download/<name> URL.
          SRC="${{ inputs.artifact-name }}-${{ github.sha }}.tar.zst"
          RELEASE="${{ inputs.artifact-name }}.tar.zst"
          # GitHub release assets are capped at 2 GiB per file. Split below that
          # with headroom so the upload never bumps the ceiling.
          CHUNK_MIB=1900
          LIMIT=$(( CHUNK_MIB * 1024 * 1024 ))
          SIZE=$(stat -c%s "$SRC")
          if [ "$SIZE" -ge "$LIMIT" ]; then
            echo "Tarball is ${SIZE} bytes (>= ${LIMIT}); splitting into ${CHUNK_MIB} MiB numbered parts."
            # Produces RELEASE.part00, .part01, … that reassemble byte-for-byte
            # with `cat RELEASE.part* > RELEASE`.
            split --bytes="${CHUNK_MIB}M" --numeric-suffixes --suffix-length=2 "$SRC" "${RELEASE}.part"
            # Checksum recorded against the reassembled (clean) name so a consumer
            # can `sha256sum -c` it straight after concatenating the parts.
            echo "$(sha256sum "$SRC" | cut -d' ' -f1)  ${RELEASE}" > "${RELEASE}.sha256"
            ls -lh "${RELEASE}".part* "${RELEASE}.sha256"
            {
              echo "notes<<RELEASE_NOTES_EOF"
              echo ""
              echo "### Reassembling \`${RELEASE}\`"
              echo ""
              echo "This image exceeded GitHub's 2 GiB per-file release limit and was"
              echo "split into numbered parts. Download every \`${RELEASE}.part*\` file, then:"
              echo ""
              echo '```sh'
              echo "cat ${RELEASE}.part* > ${RELEASE}"
              echo "sha256sum -c ${RELEASE}.sha256"
              echo '```'
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "Tarball is ${SIZE} bytes (< ${LIMIT}); uploading as a single asset."
            # Clean-named copy so the single-file release asset uses the same
            # stable name as the split case.
            cp "$SRC" "$RELEASE"
            echo "notes=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # When the tarball was split the single-file glob matches nothing and
          # the .part*/.sha256 globs match; when it wasn't split the reverse is
          # true. fail_on_unmatched_files defaults to false, so unmatched globs
          # are skipped rather than failing the release.
          append_body: true
          body: ${{ steps.release_assets.outputs.notes }}
          files: |
            ${{ inputs.artifact-name }}.tar.zst
            ${{ inputs.artifact-name }}.tar.zst.part*
            ${{ inputs.artifact-name }}.tar.zst.sha256
            ${{ inputs.artifact-name }}-${{ github.sha }}-kas-dump.yml
            ${{ inputs.artifact-name }}-kas-dump.yml

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Build notification message
        id: msg
        run: |
          RESULT="${{ needs.build.result }}"
          if [ "$RESULT" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MSG="${EMOJI} *${{ github.workflow }}* — ${RESULT}"
          MSG="${MSG}\n"
          MSG="${MSG}\n*Branch:* ${GITHUB_REF_NAME}"
          MSG="${MSG}\n*Commit:* ${{ github.sha }}"
          MSG="${MSG}\n*Triggered by:* ${{ github.actor }}"
          MSG="${MSG}\n"
          MSG="${MSG}\n<${RUN_URL}|View run>"

          echo "text=${MSG}" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "${{ steps.msg.outputs.text }}"
            }

  announce-release:
    runs-on: ubuntu-latest
    needs: build
    # Only when a tag was pushed and its build succeeded — a tag build that
    # passes is a new release worth announcing.
    if: needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Build release announcement
        id: msg
        run: |
          TAG="${GITHUB_REF_NAME}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"

          MSG="🚀 *New release: ${TAG}*"
          MSG="${MSG}\n"
          MSG="${MSG}\n*Repository:* ${{ github.repository }}"
          MSG="${MSG}\n*Commit:* ${{ github.sha }}"
          MSG="${MSG}\n*Released by:* ${{ github.actor }}"
          MSG="${MSG}\n"
          MSG="${MSG}\n<${RELEASE_URL}|View release> · <${RUN_URL}|View build>"

          echo "text=${MSG}" >> $GITHUB_OUTPUT

      - name: Send Slack release announcement
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "${{ steps.msg.outputs.text }}"
            }
